    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --primary: #4546d7;
            --red-team: #e11d48;
            --blue-team: #2563eb;
            --font-main: 'Be Vietnam Pro', sans-serif;
            --font-display: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
        }

        /* ── STREAMING_CHUNK:Styling the interactive map... --> */
        /* Draggable map container and layout */
        .map-viewport {
            width: 100vw;
            height: calc(100vh - 72px);
            position: relative;
            overflow: auto;
            cursor: grab;
            user-select: none;
            background-image: 
                radial-gradient(var(--border) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            scroll-behavior: smooth;
        }
        .map-viewport:active {
            cursor: grabbing;
        }

        .map-content {
            width: 1900px;
            height: 1000px;
            position: relative;
        }

        /* Clean circular nodes with direct text and details labels */
        .world-node {
            position: absolute;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--surface);
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2;
        }

        .world-node:hover {
            transform: scale(1.1);
            border-color: var(--theme-color, var(--primary));
        }

        .world-node.active-selection {
            transform: scale(1.15);
            border-color: var(--theme-color, var(--primary)) !important;
            background: #fafafd;
        }

        .world-node.locked {
            filter: grayscale(1) opacity(0.4);
            border-style: dashed;
        }

        /* ── STREAMING_CHUNK:Styling labels and connectors... --> */
        .node-label {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.72rem;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
            color: #334155;
            transition: all 0.25s;
        }
        .world-node:hover .node-label,
        .world-node.active-selection .node-label {
            border-color: var(--theme-color, var(--primary));
            color: var(--theme-color, var(--primary));
        }

        /* Curved vector visual connections */
        .svg-connections {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection-path {
            stroke: #cbd5e1;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 8 6;
            transition: all 0.4s ease;
        }
        .connection-path.active {
            stroke: var(--theme-color, var(--primary));
            stroke-dasharray: none;
            stroke-width: 4.5;
        }

        /* ── STREAMING_CHUNK:Styling sliding drawer... --> */
        /* Slide drawers details panel */
        .details-drawer {
            position: fixed;
            top: 72px; bottom: 0; right: -420px;
            width: 400px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.02);
            z-index: 30;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }
        .details-drawer.open {
            right: 0;
        }

        /* Mode choosing triggers layout */
        .path-toggle-wrapper {
            display: inline-flex;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 99px;
        }
        .path-btn {
            padding: 8px 18px;
            border-radius: 99px;
            font-weight: 800;
            font-size: 0.8rem;
            font-family: var(--font-display);
            transition: all 0.25s;
        }
        .path-btn.active.attack {
            background: var(--red-team);
            color: white;
        }
        .path-btn.active.defend {
            background: var(--blue-team);
            color: white;
        }

        /* ── STREAMING_CHUNK:Styling level layout nodes... --> */
        /* Simple clean level lists */
        .lvl-row-btn {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            text-align: left;
        }
        .lvl-row-btn:hover:not(.locked) {
            transform: translateY(-2px);
            border-color: var(--theme-color, var(--primary));
        }
        .lvl-row-btn.locked {
            opacity: 0.45;
            background: #f8fafc;
            cursor: not-allowed;
        }
        .lvl-row-btn.solved {
            border-color: #bbf7d0;
            background: #fafdfb;
        }

        /* Dialog Settings panel styling */
        .modal-bg {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.15);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-bg.active { opacity: 1; }
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 90%; max-width: 400px;
            border-radius: 28px;
            padding: 32px;
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .modal-bg.active .modal-card { transform: scale(1); }

        .toggle-switch {
            width: 44px; height: 24px; border-radius: 99px; background: #cbd5e1;
            position: relative; cursor: pointer; transition: background 0.2s;
        }
        .toggle-switch.on { background: #10b981; }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px; border-radius: 50%; background: white;
            transition: left 0.2s;
        }
        .toggle-switch.on::after { left: 22px; }
    </style>
</head>

        // ── MAP DRAG PAN LOGIC ───────────────────────────────────────────────────
        const viewport = document.getElementById('mapViewport');

        let startX, startY, scrollLeft, scrollTop;

        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.world-node') || e.target.closest('button')) return;
            isDragging = true;
            viewport.classList.add('grabbing');
            startX = e.pageX - viewport.offsetLeft;
            startY = e.pageY - viewport.offsetTop;
            scrollLeft = viewport.scrollLeft;
            scrollTop = viewport.scrollTop;
        });

        viewport.addEventListener('mouseleave', () => { isDragging = false; });
        viewport.addEventListener('mouseup', () => { isDragging = false; });

        viewport.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - viewport.offsetLeft;
            const y = e.pageY - viewport.offsetTop;
            const walkX = (x - startX) * 1.5;
            const walkY = (y - startY) * 1.5;
            viewport.scrollLeft = scrollLeft - walkX;
            viewport.scrollTop = scrollTop - walkY;
        });

        // ── NAVIGATION & RENDERING ───────────────────────────────────────────────
        function setMode(mode) {
            activeMode = mode;
            
            const btnAttack = document.getElementById('mode-attack-btn');
            const btnDefend = document.getElementById('mode-defend-btn');

            const themeColor = mode === 'attack' ? 'var(--red-team)' : 'var(--blue-team)';
            document.documentElement.style.setProperty('--theme-color', themeColor);

            if (mode === 'attack') {
                btnAttack.className = 'path-btn active attack';
                btnDefend.className = 'path-btn';
            } else {
                btnAttack.className = 'path-btn';
                btnDefend.className = 'path-btn active defend';
            }

            renderMap();
            updateProfileInfo();
            
            if (document.getElementById('detailsDrawer').classList.contains('open')) {
                openWorldDrawer(activeWorld);
            }
        }

        // ── STREAMING_CHUNK:Updating dynamic cadet identities...
        function updateProfileInfo() {
            const alias = localStorage.getItem('bytelearn_alias') || 'Hacker';
            document.getElementById('profileName').innerText = alias;

            const total = totalSolvedInMode(activeMode);
            let rank = RANKS[0];
            for (const r of RANKS) {
                if (total >= r.min) rank = r;
            }
            document.getElementById('profileRank').innerText = `${rank.icon} ${rank.name}`;
        }

        // ── STREAMING_CHUNK:Drawing dynamic connectors SVG map...
        function renderMap() {
            const container = document.getElementById('mapContent');
            
            // Wipe existing nodes
            document.querySelectorAll('.world-node').forEach(node => node.remove());

            // Compile SVG paths sequential lines
            const svg = document.getElementById('svgCanvas');
            svg.innerHTML = '';
            
            for (let i = 0; i < WORLDS.length - 1; i++) {
                const w1 = WORLDS[i];
                const w2 = WORLDS[i + 1];
                
                const solvedPrev = getSolved(w1.id);
                const isPathActive = solvedPrev.length >= 5 || settings.unlock;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                
                const dx = w2.x - w1.x;
                const dy = w2.y - w1.y;
                const cx1 = w1.x + dx * 0.5;
                const cy1 = w1.y;
                const cx2 = w1.x + dx * 0.5;
                const cy2 = w2.y;

                path.setAttribute('d', `M ${w1.x + 32} ${w1.y + 32} C ${cx1 + 32} ${cy1 + 32}, ${cx2 + 32} ${cy2 + 32}, ${w2.x + 32} ${w2.y + 32}`);
                path.setAttribute('class', `connection-path ${isPathActive ? 'active' : ''}`);
                
                svg.appendChild(path);
            }

            // ── STREAMING_CHUNK:Placing map nodes dynamically...
            WORLDS.forEach((w, index) => {
                const solved = getSolved(w.id);
                const doneCount = solved.length;

                // Sequential locked status checks
                let isLocked = false;
                if (index > 0 && !settings.unlock) {
                    const prevWorldSolved = getSolved(WORLDS[index - 1].id);
                    if (prevWorldSolved.length < 5) {
                        isLocked = true;
                    }
                }

                const node = document.createElement('div');
                node.className = `world-node ${isLocked ? 'locked' : ''} ${w.id === activeWorld ? 'active-selection' : ''}`;
                node.style.left = `${w.x}px`;
                node.style.top = `${w.y}px`;
                
                if (w.id === activeWorld) {
                    node.style.borderColor = activeMode === 'attack' ? 'var(--red-team)' : 'var(--blue-team)';
                }

                node.innerHTML = `
                    <span>${w.icon}</span>
                    <div class="node-label">
                        <div class="text-[8px] uppercase tracking-wider text-slate-400 font-bold leading-none">World ${String(w.id).padStart(2,'0')}</div>
                        <div class="font-extrabold mt-0.5 text-[10px] leading-tight">${w.name}</div>
                        <div class="text-[8px] font-bold text-emerald-600 mt-0.5">${doneCount}/5 Solved</div>
                    </div>
                `;

                node.onclick = (e) => {
                    e.stopPropagation();
                    if (isLocked) {
                        alert('Complete all challenges in the previous world to unlock this node!');
                        return;
                    }
                    selectNode(w.id);
                };

                container.appendChild(node);
            });
        }

        function selectNode(worldId) {
            activeWorld = worldId;
            renderMap();
            openWorldDrawer(worldId);
        }

        // ── DRAWER PANEL CONTROLS ────────────────────────────────────────────────
        function openWorldDrawer(worldId) {
            const w = WORLDS.find(x => x.id === worldId);
            const solved = getSolved(worldId);
            const levels = LEVELS[worldId] || [];
            const done = solved.length;
            const pct = (done / 5) * 100;
            const nextL = getNextLevel(worldId, solved);
            const freeMode = settings.unlock;

            const drawer = document.getElementById('detailsDrawer');
            
            document.getElementById('drawerWorldIcon').innerText = w.icon;
            document.getElementById('drawerWorldName').innerText = w.name;
            document.getElementById('drawerWorldDesc').innerText = activeMode === 'attack'
                ? `${w.desc}. Explore frontend properties, change DOM inputs, and bypass filters.`
                : `${w.desc}. Seal DOM properties leaks, declare strong validations, and set secure frameworks.`;

            document.getElementById('drawerProgressText').innerText = `${done}/5 Labs Solved`;
            document.getElementById('drawerProgressBar').style.width = `${pct}%`;
            document.getElementById('drawerProgressBar').style.backgroundColor = activeMode === 'attack' ? 'var(--red-team)' : 'var(--blue-team)';

            const list = document.getElementById('drawerLevelsList');
            
            // Build challenges within details drawer sequentially
            list.innerHTML = levels.map(({ l, name, desc }) => {
                const isSolved = solved.includes(l);
                const isLocked = !freeMode && !isSolved && l !== nextL && (nextL === -1 || l > nextL);
                
                const href = `${activeMode}/${l}/index.html`;

                let statusBadge = '';
                if (isSolved) {
                    statusBadge = `<span class="text-xs font-bold text-emerald-600">✓ Done</span>`;
                } else if (isLocked) {
                    statusBadge = `<span class="text-xs text-slate-400 font-bold">🔒 Locked</span>`;
                } else {
                    statusBadge = `<span class="text-xs font-bold" style="color: var(--theme-color)">Launch &rarr;</span>`;
                }

                return `
                    <a href="${isLocked ? '#' : href}" class="lvl-row-btn ${isSolved ? 'solved' : ''} ${isLocked ? 'locked' : ''}">
                        <div class="flex-1 pr-4">
                            <div class="text-[8px] font-extrabold uppercase tracking-widest text-slate-400">Lab ${String(l).padStart(2,'0')}</div>
                            <div class="font-display font-extrabold text-xs text-slate-800 mt-0.5">${name}</div>
                            <div class="text-[10px] text-slate-400 mt-1 leading-normal">${desc}</div>
                        </div>
                        <div class="flex-shrink-0">
                            ${statusBadge}
                        </div>
                    </a>
                `;
            }).join('');

            drawer.classList.add('open');
        }

        function closeDrawer() {
            document.getElementById('detailsDrawer').classList.remove('open');
            renderMap();
        }

        // ── SETTINGS MODAL ────────────────────────────────────────────────────────
        function openSettings() {
            const el = document.getElementById('settingsModal');
            el.style.display = 'flex';
            requestAnimationFrame(() => el.classList.add('active'));
            syncToggles();
        }
        
        function closeSettings() {
            const el = document.getElementById('settingsModal');
            el.classList.remove('active');
            setTimeout(() => el.style.display = 'none', 300);
        }

        function syncToggles() {
            document.getElementById('toggleUnlock').classList.toggle('on', settings.unlock);
        }

        function toggleSetting(key) {
            settings[key] = !settings[key];
            localStorage.setItem('bytelab_settings', JSON.stringify(settings));
            syncToggles();
            renderMap();
            if (document.getElementById('detailsDrawer').classList.contains('open')) {
                openWorldDrawer(activeWorld);
            }
        }

        function resetProgress() {
            if (!confirm('Are you sure you want to reset ALL progress? This cannot be undone.')) return;
            for (let w = 0; w <= 10; w++) {
                localStorage.removeItem(`bl_w${w}`);
                localStorage.removeItem(`bl_solved_attack_${w}`);
                localStorage.removeItem(`bl_solved_defend_${w}`);
            }
            localStorage.removeItem('bytelearn_attack_0');
            localStorage.removeItem('bytelearn_alias');
            closeSettings();
            setMode(activeMode);
        }

        // Close settings modal on overlay click
        document.getElementById('settingsModal').onclick = e => {
            if (e.target === e.currentTarget) closeSettings();
        };

        // ── INITIALIZATION ───────────────────────────────────────────────────────
        const worldParam = new URLSearchParams(location.search).get('world');
        if (worldParam !== null) {
            activeWorld = parseInt(worldParam);
        }

        setMode(activeMode);
        
        // Dynamic centering of viewport map on launch
        setTimeout(() => {
            const node = WORLDS.find(w => w.id === activeWorld);
            if (node) {
                viewport.scrollLeft = node.x - viewport.clientWidth / 2 + 32;
                viewport.scrollTop = node.y - viewport.clientHeight / 2 + 32;
            }
        }, 300);
    </script>
</body>
</html>
