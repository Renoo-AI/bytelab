<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteLab | GridControl 4.3</title>
<link rel="icon" type="image/png" href="https://dropshare.42web.io/1/files/UIi3dXms4F.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6fb;--text:#1d1d1f;--primary:#4546d7;--secondary:#86868b;--border:#e2e8f0;--font-main:'Be Vietnam Pro',sans-serif;--font-display:'Plus Jakarta Sans',sans-serif}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-main);overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#header-nav{position:fixed;top:0;left:0;right:0;height:80px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;z-index:1000;background:rgba(245,246,251,0.8);backdrop-filter:blur(10px)}
.logo-group{display:flex;align-items:center;gap:12px;flex-shrink:0}
.app-logo{width:32px;height:32px;object-fit:contain}
.progress-box{display:flex;align-items:center;gap:12px;flex-grow:1;max-width:300px;margin:0 40px}
.progress-rail{flex-grow:1;height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);transition:width 1s cubic-bezier(0.65,0,0.35,1)}
.progress-text{font-size:.85rem;font-weight:800;color:var(--secondary);min-width:30px}
.btn-quit{color:var(--secondary);font-weight:700;font-size:1rem;transition:color .2s;cursor:pointer;border:none;background:none}
.btn-quit:hover{color:#f43f5e}

.assistant-container{position:fixed;top:120px;right:60px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;z-index:1000;max-width:280px;opacity:0;transform:translateY(10px);transition:all .9s cubic-bezier(0.34,1.56,0.64,1)}
.assistant-container.victory-move{top:50%!important;right:50%!important;transform:translate(50%,-50%) scale(1.1)!important;align-items:center;max-width:440px}
.bubble{background:white;padding:20px 24px;border-radius:28px;box-shadow:0 20px 50px rgba(0,0,0,0.06);text-align:right;position:relative;transition:opacity .4s ease,transform .4s ease}
.bubble.hidden-msg{opacity:0;transform:scale(0.95) translateY(10px);pointer-events:none}
.assistant-container.victory-move .bubble{text-align:center;padding:32px}
.bubble::after{content:'';position:absolute;bottom:-8px;right:24px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid white}
.assistant-container.victory-move .bubble::after{left:50%;right:auto;transform:translateX(-50%)}
.bubble-text{font-size:1.1rem;font-weight:600;line-height:1.5;color:#334155}
.mascot-img{width:72px;height:72px;object-fit:contain;transition:all .6s cubic-bezier(0.175,0.885,0.32,1.275)}
.assistant-container.victory-move .mascot-img{width:150px;height:150px}

.card{background:white;width:100%;max-width:500px;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,0.04);border:1px solid var(--border);opacity:0;transform:translateY(20px);transition:all .8s cubic-bezier(0.2,1,0.2,1);display:flex;flex-direction:column;overflow:hidden}
.card-exit{transform:scale(0.85) translateY(-50px);opacity:0!important;filter:blur(12px);pointer-events:none}

#transition-screen{position:fixed;inset:0;background:var(--primary);z-index:3000;opacity:1;pointer-events:none;transition:opacity .6s ease}
#story-overlay{position:fixed;inset:0;background:white;z-index:1500;display:flex;justify-content:center;align-items:center;transition:opacity .5s ease}


.diag-header{padding:24px;background:#1e293b;color:white;}
.diag-body{padding:32px;}
.metric-box{background:#f1f5f9;padding:16px;border-radius:8px;font-family:monospace;margin-bottom:16px;}
.btn-fetch{background:var(--primary);color:white;width:100%;padding:12px;border-radius:8px;font-weight:bold;}

</style>
</head>
<body>

<div id="transition-screen"></div>

<div id="story-overlay">
  <div class="text-center max-w-md p-5">
    <img src="https://dropshare.42web.io/1/files/zVYAUZDpex.png" class="w-24 mx-auto mb-8" alt="Byte">
    <h1 class="text-3xl font-extrabold mb-4 tracking-tight" style="font-family: var(--font-display);">GridControl: Target Endpoint Divergence</h1>
    <p class="text-lg text-slate-500 mb-10 font-medium leading-relaxed">A real-time grid component pulls metrics from a path specified in `data-source-path="/api/public"`. Modify the target property to force the component to pull confidential diagnostic matrices.</p>
    <button onclick="startLevel()" class="bg-[#4546d7] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all shadow-lg shadow-[#4546d7]/30">Start Simulation</button>
  </div>
</div>

<header id="header-nav" class="opacity-0">
  <div class="logo-group">
    <img src="https://dropshare.42web.io/1/files/UIi3dXms4F.png" class="app-logo" alt="ByteLearn">
    <span style="font-family: var(--font-display); font-weight:800; font-size:1.1rem; letter-spacing:-0.5px;">ByteLab</span>
  </div>
  <div class="progress-box">
    <div class="progress-rail"><div id="progress-fill-bar" class="progress-fill" style="width:40%"></div></div>
    <span id="progress-text-val" class="progress-text">3/5</span>
  </div>
  <button onclick="quit()" class="btn-quit">Quit</button>
</header>

<main id="game-stage" class="w-full flex flex-col items-center justify-center">
  <div id="assistant" class="assistant-container">
    <div id="bubble-node" class="bubble hidden-msg"><p class="bubble-text" id="talk-text"></p></div>
    <img id="mascot" src="https://dropshare.42web.io/1/files/n3cWyiNBjO.png" class="mascot-img" alt="Byte">
  </div>

  <div id="card" class="card">

    <div class="diag-header">
      <h2 class="font-bold">Grid Diagnostics</h2>
    </div>
    <div class="diag-body">
      <div id="metric-display" class="metric-box" data-source-path="/api/public">
        > STATUS: OK<br>
        > LOAD: 42%
      </div>
      <button class="btn-fetch" id="fetch-btn">Fetch Metrics</button>
    </div>

  </div>
</main>

<script>
const BYTE_NORMAL = 'https://dropshare.42web.io/1/files/n3cWyiNBjO.png';
const BYTE_PC = 'https://dropshare.42web.io/1/files/Ld5zPZ4pIf.png';
let hasWon = false;
let hintTimeout, talkTimeout;

const transition = document.getElementById('transition-screen');
const assistant = document.getElementById('assistant');
const mascot = document.getElementById('mascot');
const bubble = document.getElementById('bubble-node');
const talkText = document.getElementById('talk-text');
const cardEl = document.getElementById('card');
const fillBar = document.getElementById('progress-fill-bar');
const progLabel = document.getElementById('progress-text-val');

function speak(text, persist) {
  clearTimeout(talkTimeout);
  talkText.innerText = text;
  bubble.classList.remove('hidden-msg');
  if (!persist) talkTimeout = setTimeout(function(){ bubble.classList.add('hidden-msg'); }, 6000);
}

function fadeIn() { transition.style.opacity = '0'; }
document.addEventListener('DOMContentLoaded', function(){ setTimeout(fadeIn, 200); });
setTimeout(fadeIn, 800);

function startLevel() {
  document.getElementById('story-overlay').style.display = 'none';
  document.getElementById('header-nav').style.opacity = '1';
  assistant.style.opacity = '1';
  assistant.style.transform = 'translateY(0)';
  if (cardEl) { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; }

  speak("The component fetches data from a path defined in an HTML attribute.", false);

  hintTimeout = setTimeout(function(){
    if (!hasWon) speak("Change `data-source-path` from `/api/public` to something like `/api/private` or `/api/diagnostic`.");
  }, 15000);


}

function handleWin(winMsg) {
  if (hasWon) return;
  hasWon = true;
  clearTimeout(hintTimeout);
  clearTimeout(talkTimeout);

  if (window.parent) window.parent.postMessage({ type: 'LEVEL_COMPLETE', world: 4, level: 3 }, '*');

  setTimeout(function() {
    if (cardEl) cardEl.classList.add('card-exit');
    assistant.classList.add('victory-move');
    mascot.src = BYTE_PC;
    speak(winMsg || 'Bypass successful. You forced the system logic to break.', true);

    setTimeout(function() {
      fillBar.style.width = '60%';
      progLabel.innerText = '3/5';
      progLabel.style.color = '#4546d7';

      setTimeout(function() {
        transition.style.opacity = '1';
        setTimeout(function(){
          window.location.href = '../4/index.html';
        }, 800);
      }, 2500);
    }, 800);
  }, 1500);
}

function quit() {
  transition.style.opacity = '1';
  setTimeout(function(){ window.location.href = '../../game.html'; }, 600);
}


document.getElementById('fetch-btn').addEventListener('click', function() {
  if (hasWon) return;
  const path = document.getElementById('metric-display').getAttribute('data-source-path');
  if (path !== '/api/public') {
    document.getElementById('metric-display').innerHTML = "> DIAGNOSTIC OVERRIDE<br>> MASTER_KEY: GC_9921_X";
    handleWin('Endpoint redirected. You forced the client to pull restricted data.');
  } else {
    speak('Fetching from public endpoint... No anomalies found.');
  }
});

</script>
</body>
</html>
