<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05050f;
  --surface:#0d0d1a;
  --surface2:#111120;
  --surface3:#16162a;
  --primary:#5b5ef4;
  --primary-dim:rgba(91,94,244,0.15);
  --accent:#a78bfa;
  --text:#f0f0ff;
  --muted:#6b7280;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --success:#10b981;
  --font:'Plus Jakarta Sans',sans-serif;
  --font-body:'Be Vietnam Pro',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column}

/* ── GRID BG ───────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(91,94,244,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(91,94,244,0.025) 1px,transparent 1px);
  background-size:48px 48px;
}

/* ── TOPBAR ────────────────────────── */
.topbar{
  position:relative;z-index:10;
  height:64px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(5,5,15,0.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.topbar-logo img{width:26px;height:26px;object-fit:contain}
.topbar-logo span{font-family:var(--font);font-weight:800;font-size:1.1rem;letter-spacing:-.03em;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-weight:600;font-size:.8rem;
  cursor:pointer;transition:all .2s;font-family:var(--font-body);
}
.topbar-btn:hover{border-color:var(--border2);color:var(--text)}
.topbar-btn svg{width:15px;height:15px;flex-shrink:0}

/* ── MAIN LAYOUT ───────────────────── */
.layout{
  position:relative;z-index:1;
  flex:1;display:flex;overflow:hidden;
}

/* ── SIDEBAR ───────────────────────── */
.sidebar{
  width:280px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.sidebar-head{
  padding:28px 24px 20px;
  border-bottom:1px solid var(--border);
}
.sidebar-label{font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.sidebar-title{font-family:var(--font);font-size:1.05rem;font-weight:800;margin-bottom:2px}
.sidebar-sub{font-size:.8rem;color:var(--muted)}

.sidebar-worlds{padding:12px 12px;}
.world-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:14px;
  cursor:pointer;transition:all .2s;
  border:1px solid transparent;
  margin-bottom:4px;
}
.world-row:hover{background:var(--surface2);border-color:var(--border)}
.world-row.active{background:var(--primary-dim);border-color:rgba(91,94,244,0.25)}
.world-icon-sm{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.world-row-info{flex:1;min-width:0}
.world-row-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.world-row-desc{font-size:.72rem;color:var(--muted);margin-top:1px}
.world-progress-mini{display:flex;gap:3px;margin-top:6px}
.mini-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background .2s}
.mini-dot.done{background:var(--success)}
.mini-dot.current{background:var(--primary)}

/* ── CONTENT AREA ──────────────────── */
.content{flex:1;overflow-y:auto;padding:36px 40px}

/* WORLD HEADER */
.world-header{margin-bottom:32px}
.world-header-top{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.world-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-dim);border:1px solid rgba(91,94,244,0.2);
  border-radius:99px;padding:4px 12px;
  font-size:.7rem;font-weight:800;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;
}
.world-header h1{font-family:var(--font);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.world-header p{color:var(--muted);font-size:.9rem}

/* PROGRESS BAR */
.world-progress-bar{
  background:rgba(255,255,255,0.06);border-radius:99px;height:4px;margin:20px 0;overflow:hidden;
}
.world-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width .8s cubic-bezier(0.65,0,0.35,1)}

/* LEVELS GRID */
.levels-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;
}
.level-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px 20px;
  cursor:pointer;
  transition:all .25s;
  text-decoration:none;color:var(--text);
  display:block;position:relative;overflow:hidden;
}
.level-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  opacity:0;transition:opacity .3s;
}
.level-card:hover{transform:translateY(-3px);border-color:rgba(91,94,244,0.3)}
.level-card:hover::before{opacity:.06}
.level-card.solved{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.06)}
.level-card.solved::before{background:linear-gradient(135deg,#10b981,#34d399)}
.level-card.locked{opacity:.35;pointer-events:none}

.level-num{
  font-family:var(--font);font-size:.7rem;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}
.level-name{font-family:var(--font);font-size:1rem;font-weight:800;margin-bottom:6px;line-height:1.3}
.level-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
.level-status{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:16px;padding:4px 10px;border-radius:99px;
  font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
}
.level-status.open{background:var(--primary-dim);color:var(--accent)}
.level-status.solved{background:rgba(16,185,129,0.15);color:#34d399}
.level-status.locked{background:rgba(255,255,255,0.04);color:var(--muted)}
.level-status svg{width:12px;height:12px}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.stat-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:20px;

.stat-card-num{font-family:var(--font);font-size:1.6rem;font-weight:800;margin-bottom:2px}
.stat-card-label{font-size:.75rem;color:var(--muted);font-weight:600}

/* ── SETTINGS MODAL ────────────────── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);
  z-index:1000;display:none;justify-content:center;align-items:center;
  opacity:0;transition:opacity .25s;
}
#modal-overlay.active{display:flex;opacity:1}
.modal-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:28px;
  width:90%;max-width:400px;padding:36px;
  transform:translateY(16px);transition:transform .3s cubic-bezier(0.2,1,0.2,1);
}
#modal-overlay.active .modal-card{transform:translateY(0)}
.modal-title{font-family:var(--font);font-weight:800;font-size:1.2rem;margin-bottom:4px}
.modal-sub{font-size:.8rem;color:var(--muted);margin-bottom:24px}
.setting-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--border);

.setting-row:last-of-type{border-bottom:none}
.setting-info h4{font-weight:700;font-size:.9rem}
.setting-info p{font-size:.75rem;color:var(--muted);margin-top:2px}
.toggle{
  width:44px;height:24px;border-radius:99px;
  background:rgba(255,255,255,0.08);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none;
}
.toggle.on{background:var(--primary)}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;border-radius:50%;background:white;
  transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);

.toggle.on::after{transform:translateX(20px)}
.modal-btn{
  display:block;width:100%;padding:13px;border-radius:14px;font-weight:700;font-size:.9rem;
  border:none;cursor:pointer;margin-top:10px;font-family:var(--font-body);transition:all .2s;

.modal-btn.ghost{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.modal-btn.ghost:hover{color:var(--text)}
.modal-btn.danger{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.secret-badge{font-size:.6rem;color:var(--accent);font-weight:800;background:rgba(167,139,250,.1);padding:2px 8px;border-radius:99px;margin-left:6px}

  localStorage.setItem(`bl_w${world}`, JSON.stringify(arr));
}
function totalDone() {
  return WORLDS.reduce((acc, w) => acc + getSolved(w.id).length, 0);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const container = document.getElementById('worldList');
  container.innerHTML = '';
  WORLDS.forEach(w => {
    const solved = getSolved(w.id);
    const row = document.createElement('div');
    row.className = 'world-row' + (w.id === activeWorld ? ' active' : '');
    row.innerHTML = `
      <div class="world-icon-sm" style="background:${w.color}20">${w.icon}</div>
      <div class="world-row-info">
        <div class="world-row-name">${w.name}</div>
        <div class="world-row-desc">${w.desc}</div>
        <div class="world-progress-mini">
          ${[1,2,3,4,5].map(l =>
            `<div class="mini-dot ${solved.includes(l) ? 'done' : (l === getNextLevel(w.id, solved) ? 'current' : '')}"></div>`
          ).join('')}
        </div>
      </div>`;
    row.onclick = () => { activeWorld = w.id; renderSidebar(); renderContent(); };
    container.appendChild(row);
  });
}

function getNextLevel(worldId, solved) {
  for (let l = 1; l <= 5; l++) if (!solved.includes(l)) return l;
  return -1;
}

// ── CONTENT ───────────────────────────────────────────────────────────────────
function renderContent() {
  const w = WORLDS.find(x => x.id === activeWorld);
  const solved = getSolved(activeWorld);
  const levels = LEVELS[activeWorld] || [];
  const done = solved.length;
  const pct = (done / 5) * 100;
  const nextL = getNextLevel(activeWorld, solved);
  const freeMode = settings.unlock;

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-num" style="color:${w.color}">${done}/5</div>
        <div class="stat-card-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num">${totalDone()}/25</div>
        <div class="stat-card-label">Total Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" style="color:${done===5?'#10b981':'var(--muted)'}">
          ${done === 5 ? '★ Done' : nextL > 0 ? `Lab ${nextL}` : '—'}
        </div>
        <div class="stat-card-label">${done === 5 ? 'World Complete' : 'Up Next'}</div>
      </div>
    </div>`;

  const levelsHtml = levels.map(({ l, name, desc }) => {
    const isSolved = solved.includes(l);
    const isLocked = !freeMode && !isSolved && l !== nextL && (nextL === -1 || l > nextL);
    const href = `levels/${activeWorld}/${l}/index.html`;
    const statusHtml = isSolved
      ? `<div class="level-status solved"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Solved</div>`
      : isLocked
        ? `<div class="level-status locked"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Locked</div>`
        : `<div class="level-status open">Start Lab &rarr;</div>`;

    return `<a class="level-card ${isSolved ? 'solved' : ''} ${isLocked ? 'locked' : ''}"
      href="${isLocked ? '#' : href}">
      <div class="level-num">Lab ${String(l).padStart(2,'0')}</div>
      <div class="level-name">${name}</div>
      <div class="level-desc">${desc}</div>
      ${statusHtml}
    </a>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="world-header">
      <div class="world-header-top">
        <div class="world-badge">${w.icon} ${w.name}</div>
      </div>
      <h1>${w.name} — ${w.desc}</h1>
      <p>Use your browser's DevTools to inspect, modify, and bypass client-side restrictions.</p>
      <div class="world-progress-bar"><div class="world-progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${statsHtml}
    <div class="levels-grid">${levelsHtml}</div>
  `;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openSettings() {
  const el = document.getElementById('modal-overlay');
  el.style.display = 'flex';
  requestAnimationFrame(() => el.classList.add('active'));
  syncToggles();
}
function closeSettings() {
  const el = document.getElementById('modal-overlay');
  el.classList.remove('active');
  setTimeout(() => el.style.display = 'none', 300);
}
function syncToggles() {
  document.getElementById('toggle-unlock').classList.toggle('on', !!settings.unlock);
}
function toggleSetting(key) {
  settings[key] = !settings[key];
  localStorage.setItem('bytelab_settings', JSON.stringify(settings));
  syncToggles();
  renderContent();
}
function resetProgress() {
  if (!confirm('Reset ALL progress? Cannot be undone.')) return;
  for (let w = 1; w <= 15; w++) localStorage.removeItem(`bl_w${w}`);
  renderSidebar(); renderContent();
}
document.getElementById('modal-overlay').onclick = e => {
  if (e.target === e.currentTarget) closeSettings();
};

// ── LISTEN FOR LEVEL COMPLETE ──────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data?.type === 'LEVEL_COMPLETE') {
    markSolved(e.data.world, e.data.level);
    renderSidebar(); renderContent();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
const worldParam = parseInt(new URLSearchParams(location.search).get('world'));
if (worldParam >= 1 && worldParam <= 5) activeWorld = worldParam;

const levelParam = parseInt(new URLSearchParams(location.search).get('level'));
if (levelParam >= 1 && levelParam <= 5) {
  window.location.href = `levels/${activeWorld}/${levelParam}/index.html`;
} else {
  renderSidebar();
  renderContent();
}
</script>
</body>
</html>
